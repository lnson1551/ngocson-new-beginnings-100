<div style="font-family: Arial, sans-serif; max-width: 520px; margin: 0 auto; padding: 24px; color: #222222;">
  <h1 style="font-size: 24px; margin: 0 0 12px;">Xác nhận tài khoản</h1>
  <p style="font-size: 16px; line-height: 1.5; margin: 0 0 16px;">
    Mã OTP cho {{ .Email }} là:
  </p>
  <div style="font-size: 34px; font-weight: 700; letter-spacing: 8px; padding: 18px 20px; border-radius: 18px; background: #f7f7f7; text-align: center;">
    {{ .Token }}

  <p style="font-size: 14px; line-height: 1.5; color: #717171; margin: 18px 0 0;">
    Nếu bạn không yêu cầu tạo tài khoản, hãy bỏ qua email này.
  </p>
